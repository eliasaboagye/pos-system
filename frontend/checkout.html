<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <style>
    :root {
      --navy: #1a237e;
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d8deea;
      --shadow: 0 14px 34px rgba(26, 35, 126, 0.08);
      --danger: #c62828;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .navbar { background: var(--navy); color: #fff; }
    .nav-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .brand { font-size: 1.15rem; font-weight: 700; }
    .nav-links { display: flex; gap: 10px; flex-wrap: wrap; }
    .nav-links a, .nav-links button {
      color: #fff;
      text-decoration: none;
      border: 0;
      background: transparent;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .nav-links a.active, .nav-links a:hover, .nav-links button:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }
    .layout {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 20px;
    }
    .left-column,
    .right-column {
      display: grid;
      gap: 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 22px;
    }
    h1, h2 { margin-top: 0; color: var(--navy); }
    .toolbar {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }
    .product-grid {
      display: grid;
      gap: 14px;
    }
    .product-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      background: #fbfcff;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .product-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(26, 35, 126, 0.08);
    }
    .product-title { font-weight: 700; margin-bottom: 8px; }
    .product-meta {
      color: var(--muted);
      font-size: 0.95rem;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }
    .product-card.out-of-stock {
      cursor: not-allowed;
      opacity: 0.55;
      box-shadow: none;
      transform: none;
    }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: middle;
    }
    th {
      color: var(--muted);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .qty-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .qty-controls button,
    .pay-button,
    .remove-button {
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }
    .qty-controls button {
      width: 32px;
      height: 32px;
      background: #eef1ff;
      color: var(--navy);
    }
    .remove-button {
      background: #ffebee;
      color: var(--danger);
      padding: 8px 12px;
    }
    .summary {
      margin-top: 20px;
      display: grid;
      gap: 14px;
    }
    .summary-grid {
      display: grid;
      gap: 10px;
      padding: 16px;
      border-radius: 14px;
      background: #f8faff;
      border: 1px solid var(--border);
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.96rem;
    }
    .summary-row strong {
      color: var(--text);
    }
    .total {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--navy);
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 0.95rem;
    }
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 0.95rem;
      background: #fff;
    }
    .pay-button {
      background: var(--navy);
      color: #fff;
      padding: 14px 16px;
      font-size: 1rem;
    }
    .pay-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .status {
      min-height: 22px;
      font-size: 0.95rem;
      color: var(--danger);
    }
    .receipt-preview {
      display: grid;
      gap: 12px;
    }
    .receipt-sheet {
      border: 1px dashed #c7d0e5;
      border-radius: 16px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #f8faff 100%);
    }
    .receipt-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 14px;
    }
    .receipt-title {
      font-weight: 800;
      color: var(--navy);
    }
    .receipt-subtitle {
      font-size: 0.9rem;
      color: var(--muted);
    }
    .receipt-items {
      display: grid;
      gap: 10px;
      margin: 14px 0;
    }
    .receipt-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.95rem;
    }
    .receipt-footer {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      display: grid;
      gap: 8px;
    }
    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef1ff;
      color: var(--navy);
      font-size: 0.85rem;
      font-weight: 700;
    }
    @media (max-width: 840px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <div class="brand">POS System</div>
      <div class="nav-links">
        <a href="./dashboard.html">Dashboard</a>
        <a href="./products.html">Products</a>
        <a class="active" href="./checkout.html">Checkout</a>
        <a href="./sales.html">Sales</a>
        <button id="logoutButton" type="button">Logout</button>
      </div>
    </div>
  </nav>
  <main class="page">
    <h1>Checkout</h1>
    <div class="layout">
      <div class="left-column">
        <section class="card">
          <h2>Products</h2>
          <div class="toolbar">
            <div>
              <label for="searchInput">Search Products</label>
              <input id="searchInput" type="search" placeholder="Search by name or category">
            </div>
          </div>
          <div id="productGrid" class="product-grid"></div>
        </section>
        <section class="card">
          <h2>Receipt Preview</h2>
          <div class="receipt-preview">
            <div id="receiptPreview" class="receipt-sheet"></div>
          </div>
        </section>
      </div>
      <div class="right-column">
        <section class="card">
          <h2>Cart</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Qty</th>
                  <th>Unit Price</th>
                  <th>Line Total</th>
                  <th>Remove</th>
                </tr>
              </thead>
              <tbody id="cartBody"></tbody>
            </table>
          </div>
          <div class="summary">
            <div class="summary-grid">
              <div class="summary-row"><span>Items in Cart</span><strong id="itemCount">0</strong></div>
              <div class="summary-row"><span>Subtotal</span><strong>GHS <span id="subtotalAmount">0.00</span></strong></div>
              <div>
                <label for="discountType">Discount Type</label>
                <select id="discountType">
                  <option value="none">No Discount</option>
                  <option value="percent">Percentage (%)</option>
                  <option value="fixed">Fixed Amount (GHS)</option>
                </select>
              </div>
              <div>
                <label for="discountValue">Discount Value</label>
                <input id="discountValue" type="number" min="0" step="0.01" value="0">
              </div>
              <div class="summary-row"><span>Discount</span><strong>GHS <span id="discountAmount">0.00</span></strong></div>
            </div>
            <div class="total">Total: GHS <span id="runningTotal">0.00</span></div>
            <div>
              <label for="email">Customer Email</label>
              <input id="email" type="email" placeholder="test@example.com">
            </div>
            <button id="payButton" class="pay-button" type="button" disabled>Pay with Paystack</button>
            <div id="checkoutStatus" class="status"></div>
          </div>
        </section>
      </div>
    </div>
  </main>
  <script src="./js/auth.js"></script>
  <script src="./js/api.js"></script>
  <script>
    redirectIfNotLoggedIn();

    const productGrid = document.getElementById('productGrid');
    const cartBody = document.getElementById('cartBody');
    const runningTotal = document.getElementById('runningTotal');
    const subtotalAmount = document.getElementById('subtotalAmount');
    const discountAmount = document.getElementById('discountAmount');
    const itemCount = document.getElementById('itemCount');
    const emailInput = document.getElementById('email');
    const payButton = document.getElementById('payButton');
    const checkoutStatus = document.getElementById('checkoutStatus');
    const searchInput = document.getElementById('searchInput');
    const discountType = document.getElementById('discountType');
    const discountValue = document.getElementById('discountValue');
    const receiptPreview = document.getElementById('receiptPreview');
    const cart = new Map();
    let products = [];
    let filteredProducts = [];

    document.getElementById('logoutButton').addEventListener('click', logout);

    function formatCurrency(value) {
      return Number(value).toFixed(2);
    }

    function getDiscountSummary(subtotal) {
      const type = discountType.value;
      const rawValue = Number(discountValue.value || 0);
      let amount = 0;
      let label = 'No discount';

      if (type === 'percent' && rawValue > 0) {
        amount = subtotal * (rawValue / 100);
        label = `${rawValue}% discount`;
      } else if (type === 'fixed' && rawValue > 0) {
        amount = rawValue;
        label = `GHS ${formatCurrency(rawValue)} discount`;
      }

      if (amount > subtotal) {
        amount = subtotal;
      }

      return {
        type,
        value: rawValue,
        amount,
        label,
      };
    }

    function applyProductFilter() {
      const query = searchInput.value.trim().toLowerCase();

      filteredProducts = products.filter((product) => {
        const haystack = `${product.name} ${product.category || ''}`.toLowerCase();
        return haystack.includes(query);
      });

      renderProducts();
    }

    function renderProducts() {
      productGrid.innerHTML = '';

      if (filteredProducts.length === 0) {
        productGrid.innerHTML = '<div class="status">No matching products found.</div>';
        return;
      }

      filteredProducts.forEach((product) => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = `product-card ${product.quantity <= 0 ? 'out-of-stock' : ''}`;
        card.disabled = product.quantity <= 0;
        card.innerHTML = `
          <div class="product-title">${product.name}</div>
          <div class="product-meta">
            <span>${product.category || 'Uncategorized'}</span>
            <span>Stock: ${product.quantity}</span>
          </div>
          <div style="margin-top: 10px; font-weight: 700; color: #1a237e;">GHS ${formatCurrency(product.price)}</div>
        `;
        if (product.quantity > 0) {
          card.addEventListener('click', () => addToCart(product));
        }
        productGrid.appendChild(card);
      });
    }

    function addToCart(product) {
      const existing = cart.get(product.id);

      if (existing) {
        if (existing.quantity < product.quantity) {
          existing.quantity += 1;
        }
      } else {
        cart.set(product.id, {
          product_id: product.id,
          name: product.name,
          price: Number(product.price),
          stock: product.quantity,
          quantity: 1,
        });
      }

      renderCart();
    }

    function updateCartItem(productId, change) {
      const item = cart.get(productId);

      if (!item) {
        return;
      }

      const nextQty = item.quantity + change;

      if (nextQty <= 0) {
        cart.delete(productId);
      } else if (nextQty <= item.stock) {
        item.quantity = nextQty;
      }

      renderCart();
    }

    function removeCartItem(productId) {
      cart.delete(productId);
      renderCart();
    }

    function renderCart() {
      cartBody.innerHTML = '';
      let subtotal = 0;
      let totalItems = 0;

      cart.forEach((item) => {
        const lineTotal = item.price * item.quantity;
        subtotal += lineTotal;
        totalItems += item.quantity;

        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${item.name}</td>
          <td>
            <div class="qty-controls">
              <button type="button">-</button>
              <span>${item.quantity}</span>
              <button type="button">+</button>
            </div>
          </td>
          <td>GHS ${formatCurrency(item.price)}</td>
          <td>GHS ${formatCurrency(lineTotal)}</td>
          <td><button type="button" class="remove-button">Remove</button></td>
        `;

        const buttons = row.querySelectorAll('button');
        buttons[0].addEventListener('click', () => updateCartItem(item.product_id, -1));
        buttons[1].addEventListener('click', () => updateCartItem(item.product_id, 1));
        buttons[2].addEventListener('click', () => removeCartItem(item.product_id));

        cartBody.appendChild(row);
      });

      const discount = getDiscountSummary(subtotal);
      const total = subtotal - discount.amount;

      subtotalAmount.textContent = formatCurrency(subtotal);
      discountAmount.textContent = formatCurrency(discount.amount);
      runningTotal.textContent = formatCurrency(total);
      itemCount.textContent = totalItems;
      payButton.disabled = cart.size === 0;
      renderReceiptPreview(subtotal, discount, total, totalItems);
    }

    function renderReceiptPreview(subtotal, discount, total, totalItems) {
      const lines = Array.from(cart.values()).map((item) => `
        <div class="receipt-line">
          <span>${item.name} x ${item.quantity}</span>
          <strong>GHS ${formatCurrency(item.price * item.quantity)}</strong>
        </div>
      `).join('');

      receiptPreview.innerHTML = `
        <div class="receipt-head">
          <div>
            <div class="receipt-title">Receipt Preview</div>
            <div class="receipt-subtitle">Review items before checkout</div>
          </div>
          <span class="pill">${totalItems} item${totalItems === 1 ? '' : 's'}</span>
        </div>
        <div class="receipt-items">
          ${lines || '<div class="receipt-subtitle">No items in cart yet.</div>'}
        </div>
        <div class="receipt-footer">
          <div class="receipt-line"><span>Subtotal</span><strong>GHS ${formatCurrency(subtotal)}</strong></div>
          <div class="receipt-line"><span>${discount.label}</span><strong>- GHS ${formatCurrency(discount.amount)}</strong></div>
          <div class="receipt-line"><span>Total Payable</span><strong>GHS ${formatCurrency(total)}</strong></div>
        </div>
      `;
    }

    async function loadProducts() {
      try {
        const data = await apiGet('/api/products');

        if (!data) {
          return;
        }

        products = data.products || [];
        filteredProducts = [...products];
        renderProducts();
        renderCart();
      } catch (error) {
        checkoutStatus.textContent = error.message;
      }
    }

    payButton.addEventListener('click', async () => {
      const email = emailInput.value.trim();

      if (!email) {
        checkoutStatus.textContent = 'Email is required before payment.';
        return;
      }

      checkoutStatus.textContent = 'Preparing checkout...';
      payButton.disabled = true;
      payButton.textContent = 'Loading...';

      try {
        const items = Array.from(cart.values()).map((item) => ({
          product_id: item.product_id,
          quantity: item.quantity,
        }));

        const discount = getDiscountSummary(
          Array.from(cart.values()).reduce((sum, item) => sum + (item.price * item.quantity), 0)
        );

        const saleData = await apiPost('/api/sales', {
          items,
          discount_type: discount.type,
          discount_value: discount.value,
        });

        if (!saleData) {
          return;
        }

        const paymentData = await apiPost('/api/payments/initialize', {
          sale_id: saleData.sale_id,
          email,
        });

        if (!paymentData) {
          return;
        }

        if (!paymentData.authorization_url) {
          throw new Error('No authorization URL returned');
        }

        window.location.href = paymentData.authorization_url;
      } catch (error) {
        checkoutStatus.textContent = error.message;
        payButton.disabled = cart.size === 0;
        payButton.textContent = 'Pay with Paystack';
      }
    });

    searchInput.addEventListener('input', applyProductFilter);
    discountType.addEventListener('change', renderCart);
    discountValue.addEventListener('input', renderCart);

    loadProducts();
  </script>
</body>
</html>
