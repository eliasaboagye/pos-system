<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products</title>
  <style>
    :root {
      --navy: #1a237e;
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d8deea;
      --shadow: 0 14px 34px rgba(26, 35, 126, 0.08);
      --danger: #c62828;
      --success: #2e7d32;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .navbar { background: var(--navy); color: #fff; }
    .nav-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .brand { font-size: 1.15rem; font-weight: 700; }
    .nav-links { display: flex; gap: 10px; flex-wrap: wrap; }
    .nav-links a, .nav-links button {
      color: #fff;
      text-decoration: none;
      border: 0;
      background: transparent;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .nav-links a.active, .nav-links a:hover, .nav-links button:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 22px;
      margin-bottom: 20px;
    }
    h1, h2 { margin-top: 0; color: var(--navy); }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 0.95rem;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 0.95rem;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      cursor: pointer;
      font-weight: 700;
    }
    .primary { background: var(--navy); color: #fff; }
    .secondary { background: #eef1ff; color: var(--navy); }
    .danger { background: #ffebee; color: var(--danger); }
    .message {
      min-height: 22px;
      margin-top: 8px;
      font-size: 0.95rem;
    }
    .message.success { color: var(--success); }
    .message.error { color: var(--danger); }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 14px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: middle;
    }
    th {
      color: var(--muted);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .inline-input { min-width: 110px; }
    @media (max-width: 760px) {
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <div class="brand">POS System</div>
      <div class="nav-links">
        <a href="./dashboard.html">Dashboard</a>
        <a class="active" href="./products.html">Products</a>
        <a href="./checkout.html">Checkout</a>
        <a href="./sales.html">Sales</a>
        <button id="logoutButton" type="button">Logout</button>
      </div>
    </div>
  </nav>
  <main class="page">
    <section class="card">
      <h1>Products</h1>
      <form id="productForm">
        <div class="form-grid">
          <div>
            <label for="name">Name</label>
            <input id="name" type="text" required>
          </div>
          <div>
            <label for="category">Category</label>
            <input id="category" type="text">
          </div>
          <div>
            <label for="price">Price (GHS)</label>
            <input id="price" type="number" step="0.01" required>
          </div>
          <div>
            <label for="quantity">Quantity</label>
            <input id="quantity" type="number" min="0" value="0">
          </div>
        </div>
        <button class="primary" type="submit">Add Product</button>
        <div id="formMessage" class="message"></div>
      </form>
    </section>
    <section class="card">
      <h2>Inventory</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Category</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="./js/auth.js"></script>
  <script src="./js/api.js"></script>
  <script>
    redirectIfNotLoggedIn();

    const form = document.getElementById('productForm');
    const message = document.getElementById('formMessage');
    const tableBody = document.getElementById('productsTableBody');
    let products = [];
    let editingId = null;

    document.getElementById('logoutButton').addEventListener('click', logout);

    function setMessage(text, type) {
      message.textContent = text;
      message.className = `message ${type || ''}`;
    }

    function formatCurrency(value) {
      return Number(value).toFixed(2);
    }

    function renderProducts() {
      tableBody.innerHTML = '';

      products.forEach((product) => {
        const row = document.createElement('tr');

        if (editingId === product.id) {
          row.innerHTML = `
            <td><input class="inline-input" data-field="name" value="${product.name || ''}"></td>
            <td><input class="inline-input" data-field="category" value="${product.category || ''}"></td>
            <td><input class="inline-input" data-field="price" type="number" step="0.01" value="${product.price}"></td>
            <td><input class="inline-input" data-field="quantity" type="number" min="0" value="${product.quantity}"></td>
            <td class="actions">
              <button class="primary" type="button">Save</button>
              <button class="secondary" type="button">Cancel</button>
            </td>
          `;

          const buttons = row.querySelectorAll('button');
          buttons[0].addEventListener('click', async () => {
            const inputs = row.querySelectorAll('input');
            const updated = {};

            inputs.forEach((input) => {
              updated[input.dataset.field] = input.value;
            });

            updated.price = Number(updated.price);
            updated.quantity = Number(updated.quantity);

            try {
              await apiPut(`/api/products/${product.id}`, updated);
              editingId = null;
              await loadProducts();
              setMessage('Product updated successfully.', 'success');
            } catch (error) {
              setMessage(error.message, 'error');
            }
          });

          buttons[1].addEventListener('click', () => {
            editingId = null;
            renderProducts();
          });
        } else {
          row.innerHTML = `
            <td>${product.name}</td>
            <td>${product.category || '-'}</td>
            <td>GHS ${formatCurrency(product.price)}</td>
            <td>${product.quantity}</td>
            <td class="actions">
              <button class="secondary" type="button">Edit</button>
              <button class="danger" type="button">Delete</button>
            </td>
          `;

          const buttons = row.querySelectorAll('button');
          buttons[0].addEventListener('click', () => {
            editingId = product.id;
            renderProducts();
          });

          buttons[1].addEventListener('click', async () => {
            const confirmed = window.confirm(`Delete ${product.name}?`);

            if (!confirmed) {
              return;
            }

            try {
              await apiDelete(`/api/products/${product.id}`);
              await loadProducts();
              setMessage('Product deleted successfully.', 'success');
            } catch (error) {
              setMessage(error.message, 'error');
            }
          });
        }

        tableBody.appendChild(row);
      });
    }

    async function loadProducts() {
      try {
        const data = await apiGet('/api/products');

        if (!data) {
          return;
        }

        products = data.products || [];
        renderProducts();
      } catch (error) {
        setMessage(error.message, 'error');
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      setMessage('', '');

      const payload = {
        name: document.getElementById('name').value.trim(),
        category: document.getElementById('category').value.trim(),
        price: Number(document.getElementById('price').value),
        quantity: Number(document.getElementById('quantity').value || 0),
      };

      try {
        await apiPost('/api/products', payload);
        form.reset();
        document.getElementById('quantity').value = 0;
        await loadProducts();
        setMessage('Product added successfully.', 'success');
      } catch (error) {
        setMessage(error.message, 'error');
      }
    });

    loadProducts();
  </script>
</body>
</html>
