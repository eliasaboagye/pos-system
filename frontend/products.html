<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products</title>
  <style>
    :root {
      --navy: #1a237e;
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d8deea;
      --shadow: 0 14px 34px rgba(26, 35, 126, 0.08);
      --danger: #c62828;
      --success: #2e7d32;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .navbar { background: var(--navy); color: #fff; }
    .nav-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .brand { font-size: 1.15rem; font-weight: 700; }
    .nav-links { display: flex; gap: 10px; flex-wrap: wrap; }
    .nav-links a, .nav-links button {
      color: #fff;
      text-decoration: none;
      border: 0;
      background: transparent;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .nav-links a.active, .nav-links a:hover, .nav-links button:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 22px;
      margin-bottom: 20px;
    }
    h1, h2 { margin-top: 0; color: var(--navy); }
    .toolbar-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 14px;
      margin-bottom: 18px;
      align-items: end;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 0.95rem;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 0.95rem;
    }
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 0.95rem;
      background: #fff;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      cursor: pointer;
      font-weight: 700;
    }
    .primary { background: var(--navy); color: #fff; }
    .secondary { background: #eef1ff; color: var(--navy); }
    .danger { background: #ffebee; color: var(--danger); }
    .message {
      min-height: 22px;
      margin-top: 8px;
      font-size: 0.95rem;
    }
    .filter-banner {
      display: none;
      margin-bottom: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #cfd7ff;
      background: #eef1ff;
      color: var(--navy);
      font-weight: 600;
    }
    .message.success { color: var(--success); }
    .message.error { color: var(--danger); }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    th, td {
      padding: 14px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: middle;
      word-wrap: break-word;
    }
    th {
      color: var(--muted);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .actions-cell {
      width: 140px;
    }
    .action-buttons {
      display: flex;
      gap: 8px;
      flex-direction: column;
      align-items: stretch;
    }
    .stock-badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 700;
    }
    .stock-badge.low {
      background: #fff3e0;
      color: #ef6c00;
    }
    .stock-badge.out {
      background: #ffebee;
      color: #c62828;
    }
    .stock-badge.good {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .inline-input {
      min-width: 0;
      width: 100%;
      padding: 10px 8px;
      font-size: 0.9rem;
    }
    .stock-cell {
      line-height: 1.6;
    }
    @media (max-width: 760px) {
      .toolbar-grid { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <div class="brand">POS System</div>
      <div class="nav-links">
        <a href="./dashboard.html">Dashboard</a>
        <a class="active" href="./products.html">Products</a>
        <a href="./checkout.html">Checkout</a>
        <a href="./sales.html">Sales</a>
        <button id="logoutButton" type="button">Logout</button>
      </div>
    </div>
  </nav>
  <main class="page">
    <section class="card">
      <h1>Products</h1>
      <form id="productForm">
        <div class="form-grid">
          <div>
            <label for="name">Name</label>
            <input id="name" type="text" required>
          </div>
          <div>
            <label for="category">Category</label>
            <input id="category" type="text">
          </div>
          <div>
            <label for="price">Price (GHS)</label>
            <input id="price" type="number" step="0.01" required>
          </div>
          <div>
            <label for="supplier">Supplier</label>
            <input id="supplier" type="text">
          </div>
          <div>
            <label for="quantity">Quantity</label>
            <input id="quantity" type="number" min="0" value="0">
          </div>
        </div>
        <button class="primary" type="submit">Add Product</button>
        <div id="formMessage" class="message"></div>
      </form>
    </section>
    <section class="card">
      <h2>Inventory</h2>
      <div id="filterBanner" class="filter-banner"></div>
      <div class="toolbar-grid">
        <div>
          <label for="searchInput">Search</label>
          <input id="searchInput" type="search" placeholder="Search by product name">
        </div>
        <div>
          <label for="categoryFilter">Category</label>
          <select id="categoryFilter">
            <option value="">All Categories</option>
          </select>
        </div>
        <div>
          <label for="supplierFilter">Supplier</label>
          <select id="supplierFilter">
            <option value="">All Suppliers</option>
          </select>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Category</th>
              <th>Supplier</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="./js/auth.js"></script>
  <script src="./js/api.js"></script>
  <script>
    redirectIfNotLoggedIn();

    const form = document.getElementById('productForm');
    const message = document.getElementById('formMessage');
    const tableBody = document.getElementById('productsTableBody');
    const searchInput = document.getElementById('searchInput');
    const categoryFilter = document.getElementById('categoryFilter');
    const supplierFilter = document.getElementById('supplierFilter');
    const filterBanner = document.getElementById('filterBanner');
    const stockStatusFilter = new URLSearchParams(window.location.search).get('stockStatus');
    let products = [];
    let filteredProducts = [];
    let editingId = null;

    document.getElementById('logoutButton').addEventListener('click', logout);

    function setMessage(text, type) {
      message.textContent = text;
      message.className = `message ${type || ''}`;
    }

    function formatCurrency(value) {
      return Number(value).toFixed(2);
    }

    function getStockBadge(product) {
      const quantity = Number(product.quantity);
      let badgeClass = 'good';
      let label = 'In Stock';

      if (quantity === 0) {
        badgeClass = 'out';
        label = 'Out of Stock';
      } else if (quantity < 5) {
        badgeClass = 'low';
        label = 'Low Stock';
      }

      return `<span class="stock-badge ${badgeClass}">${label}</span>`;
    }

    function populateFilters() {
      const categories = [...new Set(products.map((product) => product.category).filter(Boolean))].sort();
      const suppliers = [...new Set(products.map((product) => product.supplier).filter(Boolean))].sort();

      categoryFilter.innerHTML = '<option value="">All Categories</option>';
      supplierFilter.innerHTML = '<option value="">All Suppliers</option>';

      categories.forEach((category) => {
        const option = document.createElement('option');
        option.value = category;
        option.textContent = category;
        categoryFilter.appendChild(option);
      });

      suppliers.forEach((supplier) => {
        const option = document.createElement('option');
        option.value = supplier;
        option.textContent = supplier;
        supplierFilter.appendChild(option);
      });
    }

    function applyFilters() {
      const searchTerm = searchInput.value.trim().toLowerCase();
      const selectedCategory = categoryFilter.value;
      const selectedSupplier = supplierFilter.value;

      filteredProducts = products.filter((product) => {
        const matchesSearch = product.name.toLowerCase().includes(searchTerm);
        const matchesCategory = !selectedCategory || product.category === selectedCategory;
        const matchesSupplier = !selectedSupplier || product.supplier === selectedSupplier;
        const isLowStock = Number(product.quantity) > 0 && Number(product.quantity) < 5;
        const isOutOfStock = Number(product.quantity) === 0;
        const matchesStockStatus =
          !stockStatusFilter ||
          (stockStatusFilter === 'low' && isLowStock) ||
          (stockStatusFilter === 'out' && isOutOfStock);

        return matchesSearch && matchesCategory && matchesSupplier && matchesStockStatus;
      });

      renderProducts();
    }

    function applyStockStatusBanner() {
      if (stockStatusFilter === 'low') {
        filterBanner.textContent = 'Showing low stock items from the dashboard.';
        filterBanner.style.display = 'block';
        return;
      }

      if (stockStatusFilter === 'out') {
        filterBanner.textContent = 'Showing out of stock items from the dashboard.';
        filterBanner.style.display = 'block';
        return;
      }

      filterBanner.textContent = '';
      filterBanner.style.display = 'none';
    }

    function renderProducts() {
      tableBody.innerHTML = '';

      if (filteredProducts.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="6">No matching products found.</td></tr>';
        return;
      }

      filteredProducts.forEach((product) => {
        const row = document.createElement('tr');

        if (editingId === product.id) {
          row.innerHTML = `
            <td><input class="inline-input" data-field="name" value="${product.name || ''}"></td>
            <td><input class="inline-input" data-field="category" value="${product.category || ''}"></td>
            <td><input class="inline-input" data-field="supplier" value="${product.supplier || ''}"></td>
            <td><input class="inline-input" data-field="price" type="number" step="0.01" value="${product.price}"></td>
            <td><input class="inline-input" data-field="quantity" type="number" min="0" value="${product.quantity}"></td>
            <td class="actions-cell">
              <div class="action-buttons">
                <button class="primary" type="button">Save</button>
                <button class="secondary" type="button">Cancel</button>
              </div>
            </td>
          `;

          const buttons = row.querySelectorAll('button');
          buttons[0].addEventListener('click', async () => {
            const inputs = row.querySelectorAll('input');
            const updated = {};

            inputs.forEach((input) => {
              updated[input.dataset.field] = input.value;
            });

            updated.price = Number(updated.price);
            updated.quantity = Number(updated.quantity);

            try {
              await apiPut(`/api/products/${product.id}`, updated);
              editingId = null;
              await loadProducts();
              setMessage('Product updated successfully.', 'success');
            } catch (error) {
              setMessage(error.message, 'error');
            }
          });

          buttons[1].addEventListener('click', () => {
            editingId = null;
            renderProducts();
          });
        } else {
          row.innerHTML = `
            <td>${product.name}</td>
            <td>${product.category || '-'}</td>
            <td>${product.supplier || '-'}</td>
            <td>GHS ${formatCurrency(product.price)}</td>
            <td class="stock-cell">${product.quantity}<br>${getStockBadge(product)}</td>
            <td class="actions-cell">
              <div class="action-buttons">
                <button class="secondary" type="button">Edit</button>
                <button class="danger" type="button">Delete</button>
              </div>
            </td>
          `;

          const buttons = row.querySelectorAll('button');
          buttons[0].addEventListener('click', () => {
            editingId = product.id;
            renderProducts();
          });

          buttons[1].addEventListener('click', async () => {
            const confirmed = window.confirm(`Delete ${product.name}?`);

            if (!confirmed) {
              return;
            }

            try {
              await apiDelete(`/api/products/${product.id}`);
              await loadProducts();
              setMessage('Product deleted successfully.', 'success');
            } catch (error) {
              setMessage(error.message, 'error');
            }
          });
        }

        tableBody.appendChild(row);
      });
    }

    async function loadProducts() {
      try {
        const data = await apiGet('/api/products');

        if (!data) {
          return;
        }

        products = data.products || [];
        populateFilters();
        applyFilters();
      } catch (error) {
        setMessage(error.message, 'error');
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      setMessage('', '');

      const payload = {
        name: document.getElementById('name').value.trim(),
        category: document.getElementById('category').value.trim(),
        supplier: document.getElementById('supplier').value.trim(),
        price: Number(document.getElementById('price').value),
        quantity: Number(document.getElementById('quantity').value || 0),
        low_stock_threshold: 5,
      };

      try {
        await apiPost('/api/products', payload);
        form.reset();
        document.getElementById('quantity').value = 0;
        await loadProducts();
        setMessage('Product added successfully.', 'success');
      } catch (error) {
        setMessage(error.message, 'error');
      }
    });

    searchInput.addEventListener('input', applyFilters);
    categoryFilter.addEventListener('change', applyFilters);
    supplierFilter.addEventListener('change', applyFilters);

    loadProducts();
    applyStockStatusBanner();
  </script>
</body>
</html>
