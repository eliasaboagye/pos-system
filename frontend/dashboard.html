<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS Dashboard</title>
  <style>
    :root {
      --navy: #1a237e;
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d8deea;
      --shadow: 0 14px 34px rgba(26, 35, 126, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .navbar { background: var(--navy); color: #fff; }
    .nav-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .brand { font-size: 1.15rem; font-weight: 700; }
    .nav-links { display: flex; gap: 10px; flex-wrap: wrap; }
    .nav-links a, .nav-links button {
      color: #fff;
      text-decoration: none;
      border: 0;
      background: transparent;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .nav-links a.active, .nav-links a:hover, .nav-links button:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }
    .hero { margin-bottom: 22px; }
    .hero h1 { margin: 0 0 8px; color: var(--navy); }
    .hero p { margin: 0; color: var(--muted); }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }
    .stat-card {
      background: var(--card);
      border-radius: 18px;
      padding: 22px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .stat-label {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--navy);
    }
    .status-banner {
      margin-bottom: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #ffd9d9;
      background: #fff5f5;
      color: #b3261e;
      display: none;
    }
    @media (max-width: 760px) {
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <div class="brand">POS System</div>
      <div class="nav-links">
        <a class="active" href="./dashboard.html">Dashboard</a>
        <a href="./products.html">Products</a>
        <a href="./checkout.html">Checkout</a>
        <a href="./sales.html">Sales</a>
        <button id="logoutButton" type="button">Logout</button>
      </div>
    </div>
  </nav>
  <main class="page">
    <section class="hero">
      <h1>Dashboard</h1>
      <p>Monitor sales activity, revenue, and product counts at a glance.</p>
    </section>
    <div id="statusBanner" class="status-banner"></div>
    <section class="stats-grid">
      <article class="stat-card">
        <div class="stat-label">Total Sales Today</div>
        <div id="salesToday" class="stat-value">0</div>
      </article>
      <article class="stat-card">
        <div class="stat-label">Revenue Today (GHS)</div>
        <div id="revenueToday" class="stat-value">0.00</div>
      </article>
      <article class="stat-card">
        <div class="stat-label">Total Products</div>
        <div id="totalProducts" class="stat-value">0</div>
      </article>
    </section>
  </main>
  <script src="./js/auth.js"></script>
  <script src="./js/api.js"></script>
  <script>
    redirectIfNotLoggedIn();
    document.getElementById('logoutButton').addEventListener('click', logout);
    const statusBanner = document.getElementById('statusBanner');

    function showStatus(message) {
      statusBanner.textContent = message;
      statusBanner.style.display = 'block';
    }

    function clearStatus() {
      statusBanner.textContent = '';
      statusBanner.style.display = 'none';
    }

    async function validateSession() {
      const token = getToken();

      if (!token) {
        logout();
        return false;
      }

      const response = await fetch('http://localhost:5000/api/auth/me', {
        headers: {
          Authorization: 'Bearer ' + token,
        },
      });

      if (response.status === 401) {
        logout();
        return false;
      }

      const data = await response.json().catch(() => ({}));

      if (!response.ok) {
        throw new Error(data.message || 'Unable to validate your session.');
      }

      return true;
    }

    async function loadStats() {
      try {
        clearStatus();

        const sessionIsValid = await validateSession();

        if (!sessionIsValid) {
          return;
        }

        const response = await fetch('http://localhost:5000/api/dashboard/stats', {
          headers: {
            Authorization: 'Bearer ' + getToken(),
          },
        });

        const data = await response.json().catch(() => ({}));

        if (response.status === 401) {
          showStatus('Session is valid, but the dashboard stats route rejected the token.');
          return;
        }

        if (!response.ok) {
          throw new Error(data.message || 'Unable to load dashboard statistics.');
        }

        document.getElementById('salesToday').textContent = data.total_sales_today;
        document.getElementById('revenueToday').textContent = data.total_revenue_today;
        document.getElementById('totalProducts').textContent = data.total_products;
      } catch (error) {
        document.getElementById('salesToday').textContent = '-';
        document.getElementById('revenueToday').textContent = '-';
        document.getElementById('totalProducts').textContent = '-';
        showStatus(error.message || 'Unable to load dashboard statistics.');
      }
    }

    loadStats();
  </script>
</body>
</html>
